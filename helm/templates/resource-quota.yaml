apiVersion: v1
kind: ResourceQuota
metadata:
  name: istio-critical-pods
spec:
  hard:
    pods: 1G # Effectively unlimited, acting only as an enabler
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values:
      - system-node-critical
      - system-cluster-critical
