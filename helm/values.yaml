global:
  profile: ambient

cni:
  ambient:
    enabled: true
    enablementSelectors:
    - namespaceSelector:
        matchExpressions:
        # Exclude certain namespaces by name
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            # Kubernetes core systems cannot be encrypted
            - "kube-system"
            - "kube-public"
            - "kube-node-lease"

            - "istio-system" # Istio cannot encrypt its own traffic because of a routing loop
            - "gke-managed-system" # Google-specific managed systems
      podSelector:
        matchExpressions:
        # Enroll all pods by default
        - key: psp.io/encrypt
          operator: NotIn
          values: ["false"]
